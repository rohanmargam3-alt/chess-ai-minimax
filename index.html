<!DOCTYPE html>
<html lang="en">
<head>

  <title>AI Chess Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>♟️ AI Chess Game (Minimax)</h1>

<script src="script.js"></script>
</body>
</html>
